apiVersion: v1.0.0
kind: DataProduct
id: 99999999-0000-4000-8000-000000000099
name: Full Standard Test
version: 4.2.0
status: active
domain: retail-analytics
tenant: Enkinex
productCreatedTs: "2024-06-01T09:00:00+02:00"

tags: ["test", "full-standard", "reference"]

customProperties:
  - property: dataClassification
    value: "internal"
  - property: retentionYears
    value: 5
  - property: encrypted
    value: true
  - property: stakeholderTeams
    value: ["analytics", "platform", "compliance"]
  - property: slaTargets
    value:
      availabilityPercent: 99.9
      maxLatencySeconds: 300

authoritativeDefinitions:
  - type: businessDefinition
    url: "https://glossary.enkinex.example/full-standard"
    description: "Root-level glossary entry"
  - type: transformationImplementation
    url: "https://git.enkinex.example/repo/full-standard-transform"
  - type: videoTutorial
    url: "https://videos.enkinex.example/full-standard"
  - type: tutorial
    url: "https://docs.enkinex.example/full-standard"
  - type: implementation
    url: "https://git.enkinex.example/repo/full-standard-impl"

description:
  purpose: "Consolidated retail analytics view spanning payments, transactions and returns."
  limitations: "Not suitable for real-time fraud detection; batch-refreshed every 15 minutes."
  usage: "Use for reporting, BI dashboards, and downstream ML feature engineering."
  authoritativeDefinitions:
    - type: businessDefinition
      url: "https://glossary.enkinex.example/full-standard-description"
    - type: implementation
      url: "https://git.enkinex.example/repo/description-impl"
  customProperties:
    - property: reviewedBy
      value: "data-governance-team"
    - property: approvedForExternalSharing
      value: false

inputPorts:
  - name: payments
    version: 1.0.0
    contractId: dbb7b1eb-7628-436e-8914-2a00638ba6db
  - name: onlinetransactions
    version: 1.1.0
    contractId: ec2a112d-5cfe-49f3-8760-f9cfb4597547
    tags: ["transactions"]
    customProperties:
      - property: transactionsVersion
        value: "1.1.0"
    authoritativeDefinitions:
      - type: businessDefinition
        url: "https://mydata.enkinex.example/dictionary"

outputPorts:
  - name: rawtransactions
    description: "Raw transactions feed"
    type: tables
    version: 1.0.0
    contractId: c2798941-1b7e-4b03-9e0d-955b1a872b32
  - name: rawtransactions
    description: "Raw transactions feed, curated"
    type: tables
    version: 2.0.0
    contractId: c2798941-1b7e-4b03-9e0d-955b1a872b33
    tags: ["transactions", "curated"]
    customProperties:
      - property: transactionsVersion
        value: "2.0.0"
    authoritativeDefinitions:
      - type: businessDefinition
        url: "https://mydata.enkinex.example/dictionary"
    sbom:
      - url: "https://sbom.enkinex.example/rawtransactions-default.json"
      - type: internal
        url: "https://sbom.enkinex.example/rawtransactions-internal.json"
    inputContracts:
      - id: dbb7b1eb-7628-436e-8914-2a00638ba6db
        version: 1.0.0
      - id: ec2a112d-5cfe-49f3-8760-f9cfb4597544
        version: 1.0.0

managementPorts:
  - name: catalog-discovery
    content: discoverability
    type: rest
    url: "https://api.enkinex.example/catalog"
    description: "Catalog discovery endpoint"
  - name: health-metrics
    content: observability
    type: rest
    url: "https://metrics.enkinex.example/health"
    tags: ["observability"]
    customProperties:
      - property: scrapeIntervalSeconds
        value: 60
  - name: lifecycle-control
    content: control
    type: rest
    url: "https://api.enkinex.example/lifecycle"
    channel: "internal-ops"
  - name: dictionary-updates
    content: dictionary
    type: topic
    channel: "tpc-dict-update"
    description: "Kafka topic for dictionary updates"
    tags: ["kafka"]
    customProperties:
      - property: kafkaTopic
        value: true
    authoritativeDefinitions:
      - type: implementation
        url: "https://mykafka.enkinex.example/topic"

support:
  - channel: "Data Team Slack"
    url: "https://enkinex.slack.com/archives/C1234567890"
    description: "Primary support channel for data product questions"
    tool: slack
    scope: interactive
    invitationUrl: "https://enkinex.slack.com/invite/DEF456"
    tags: ["slack"]
  - channel: "Email Support"
    url: "mailto:data-support@enkinex.example"
    description: "Email support for urgent issues"
    tool: email
    scope: issues
  - channel: "Roadmap Announcements"
    url: "https://enkinex.example/announcements"
    description: "Broadcast-only channel for roadmap updates"
    tool: other
    scope: announcements
  - channel: "Issue Tracker"
    url: "https://issues.enkinex.example/project/DATA"
    description: "Ticketing system for reporting problems"
    tool: ticket
    scope: issues

team:
  name: "Data Team"
  description: "The Data Team is responsible for the data product."
  tags: ["data", "team"]
  customProperties:
    - property: dataTeam
      value: true
  authoritativeDefinitions:
    - type: businessDefinition
      url: "https://glossary.enkinex.example/data-team-charter"
  members:
    - username: "john.doe@enkinex.example"
      name: "John Doe"
      description: "Data Product Owner"
      role: "owner"
      dateIn: "2023-01-15"
      tags: ["owner"]
      customProperties:
        - property: seniority
          value: "principal"
    - username: "jane.smith@enkinex.example"
      name: "Jane Smith"
      description: "Data Steward"
      role: "data steward"
      dateIn: "2023-02-01"
      dateOut: "2024-05-31"
      replacedByUsername: "kim.lee@enkinex.example"
    - username: "kim.lee@enkinex.example"
      name: "Kim Lee"
      description: "Current Data Steward"
      role: "data steward"
      dateIn: "2024-06-01"
